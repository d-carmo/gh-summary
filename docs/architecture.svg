<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#e2e8f0" letter-spacing="0.5">/gh-summary Architecture</text>

  <!-- ── Boxes ── -->

  <!-- Slack User -->
  <rect x="30" y="100" width="140" height="72" rx="10" fill="#1a1f2e" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="100" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#4a9eff">Slack User</text>
  <text x="100" y="152" text-anchor="middle" font-size="11" fill="#8892a4">/gh-summary</text>
  <text x="100" y="166" text-anchor="middle" font-size="11" fill="#8892a4">&lt;PR URL&gt;</text>

  <!-- Slack Platform -->
  <rect x="30" y="260" width="140" height="72" rx="10" fill="#1a1f2e" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="100" y="292" text-anchor="middle" font-size="13" font-weight="600" fill="#4a9eff">Slack</text>
  <text x="100" y="310" text-anchor="middle" font-size="11" fill="#8892a4">Slash Command</text>
  <text x="100" y="324" text-anchor="middle" font-size="11" fill="#8892a4">Platform</text>

  <!-- Vercel Function -->
  <rect x="340" y="180" width="180" height="90" rx="10" fill="#1a2535" stroke="#38bdf8" stroke-width="2"/>
  <text x="430" y="214" text-anchor="middle" font-size="13" font-weight="700" fill="#38bdf8">Vercel Function</text>
  <text x="430" y="232" text-anchor="middle" font-size="11" fill="#8892a4">api/gh-summary.js</text>
  <text x="430" y="250" text-anchor="middle" font-size="10" fill="#64748b">• Verify Slack signature</text>
  <text x="430" y="263" text-anchor="middle" font-size="10" fill="#64748b">• Orchestrate API calls</text>

  <!-- GitHub API -->
  <rect x="680" y="100" width="165" height="72" rx="10" fill="#1a1f2e" stroke="#34d399" stroke-width="1.5"/>
  <text x="762" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#34d399">GitHub API</text>
  <text x="762" y="150" text-anchor="middle" font-size="11" fill="#8892a4">PR · Reviews · Comments</text>
  <text x="762" y="164" text-anchor="middle" font-size="11" fill="#8892a4">CI Check Runs</text>

  <!-- Claude API -->
  <rect x="680" y="300" width="165" height="72" rx="10" fill="#1a1f2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="762" y="332" text-anchor="middle" font-size="13" font-weight="600" fill="#f59e0b">Anthropic API</text>
  <text x="762" y="350" text-anchor="middle" font-size="11" fill="#8892a4">claude-sonnet-4</text>
  <text x="762" y="364" text-anchor="middle" font-size="11" fill="#8892a4">Discussion summary</text>

  <!-- ── Arrows ── -->

  <!-- User → Slack -->
  <line x1="100" y1="172" x2="100" y2="258" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="100,258 95,246 105,246" fill="#4a9eff"/>
  <text x="110" y="220" font-size="10" fill="#64748b">types command</text>

  <!-- Slack → Vercel (POST) -->
  <line x1="170" y1="296" x2="338" y2="230" stroke="#4a9eff" stroke-width="1.5"/>
  <polygon points="338,230 326,232 330,222" fill="#4a9eff"/>
  <text x="220" y="255" font-size="10" fill="#64748b">HTTP POST</text>

  <!-- Vercel → Slack (ack) -->
  <line x1="340" y1="245" x2="172" y2="285" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="172,285 182,278 184,289" fill="#94a3b8"/>
  <text x="218" y="282" font-size="10" fill="#64748b">200 ack (&lt;1s)</text>

  <!-- Vercel → GitHub -->
  <line x1="520" y1="210" x2="678" y2="160" stroke="#34d399" stroke-width="1.5"/>
  <polygon points="678,160 666,162 668,152" fill="#34d399"/>
  <text x="570" y="178" font-size="10" fill="#64748b">REST API</text>

  <!-- Vercel → Claude -->
  <line x1="520" y1="245" x2="678" y2="320" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="678,320 666,313 669,323" fill="#f59e0b"/>
  <text x="558" y="300" font-size="10" fill="#64748b">Messages API</text>

  <!-- Vercel → Slack (result) -->
  <line x1="340" y1="260" x2="172" y2="305" stroke="#38bdf8" stroke-width="1.8"/>
  <polygon points="172,305 181,295 183,306" fill="#38bdf8"/>
  <text x="195" y="340" font-size="10" fill="#38bdf8" font-weight="600">POST response_url</text>
  <text x="195" y="354" font-size="10" fill="#64748b">(async, full result)</text>

  <!-- ── Legend ── -->
  <rect x="30" y="420" width="840" height="72" rx="8" fill="#151b27" stroke="#2d3748" stroke-width="1"/>
  <text x="50" y="443" font-size="11" font-weight="600" fill="#8892a4">LEGEND</text>
  <line x1="110" y1="438" x2="150" y2="438" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="155" y="442" font-size="11" fill="#8892a4">Slack traffic</text>
  <line x1="240" y1="438" x2="280" y2="438" stroke="#34d399" stroke-width="1.5"/>
  <text x="285" y="442" font-size="11" fill="#8892a4">GitHub API</text>
  <line x1="370" y1="438" x2="410" y2="438" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="415" y="442" font-size="11" fill="#8892a4">Claude API</text>
  <line x1="500" y1="438" x2="540" y2="438" stroke="#38bdf8" stroke-width="1.8"/>
  <text x="545" y="442" font-size="11" fill="#8892a4">Async response</text>
  <line x1="650" y1="438" x2="690" y2="438" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="695" y="442" font-size="11" fill="#8892a4">Immediate ack</text>

  <text x="50" y="472" font-size="11" fill="#64748b">① User types command  →  ② Slack POSTs to Vercel  →  ③ Vercel acks in &lt;1s  →  ④ GitHub + Claude called in parallel  →  ⑤ Result posted back to Slack</text>
</svg>
